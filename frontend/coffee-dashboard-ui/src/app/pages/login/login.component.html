<div class="login-shell">
  <section class="login-visual"></section>

  <section class="login-panel">
    <div class="brand">marketboard</div>
    <h1>Your wealth, on autopilot</h1>

    <div class="form">
      <label>Email</label>
      <input [(ngModel)]="username" type="text" placeholder="Enter Email" />

      <label>Password</label>
      <input [(ngModel)]="password" type="password" placeholder="Enter Password" />

      <button (click)="login()" [disabled]="loading">
        {{ loading ? 'Đang đăng nhập...' : 'Enter' }}
      </button>

      <div class="error" *ngIf="error">{{ error }}</div>
    </div>

    <footer>© 2026 Thái Nguyên. All rights reserved.</footer>
  </section>
</div>

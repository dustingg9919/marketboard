<div class="ai-hook-page">
  <header class="top-header">
    <div class="brand">
      <span class="logo">🚀</span>
      <div>
        <h1>AI Content Engine Pro</h1>
        <div class="subtitle">Phát triển bởi: <strong>Siêu Bụi</strong> · Hotline/Zalo: <strong>0981.668.842</strong></div>
      </div>
    </div>

    <nav class="nav-tabs">
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/ai-hook" routerLinkActive="active">AI Hook</a>
    </nav>
  </header>

  <section class="meta-row">
    <div class="meta-item">ID Máy: <strong>ID147772</strong></div>
    <div class="meta-item">Lượt: <span class="badge vip">VIP</span></div>
    <div class="meta-item">Thời gian: <strong>Vĩnh Viễn</strong></div>
  </section>

  <section class="panel form-panel">
    <label class="field">
      <span>Nhập Google Gemini API Key của bạn</span>
      <input type="password" placeholder="********************************" />
    </label>

    <div class="note">⚠️ Lưu ý: API nên phí cho phép bấm 15 lần/phút. Hãy thao tác từ từ nhé!</div>

    <label class="field">
      <span>Nhập ý tưởng (Tiêu đề chính)</span>
      <input type="text" placeholder="kiem tien online" />
    </label>

    <label class="field">
      <span>Chọn Tỷ lệ (Dùng cho Ảnh & Video)</span>
      <select>
        <option *ngFor="let option of ratioOptions">{{ option }}</option>
      </select>
    </label>

    <div class="field-grid">
      <label class="field">
        <span>Ngôn ngữ Voice (Cho Video/Live)</span>
        <select>
          <option *ngFor="let option of voiceOptions">{{ option }}</option>
        </select>
      </label>
      <label class="field">
        <span>Giới tính Voice</span>
        <select>
          <option *ngFor="let option of genderOptions">{{ option }}</option>
        </select>
      </label>
    </div>
  </section>

  <section class="action-grid">
    <button
      class="action-btn"
      *ngFor="let item of actionButtons"
      [ngClass]="item.variant"
      type="button"
    >
      {{ item.label }}
    </button>
  </section>
</div>
